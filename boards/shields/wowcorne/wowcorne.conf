# Debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# BLE TX power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fix Windows battery reporting
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Power management
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000

# Wake up
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# BLE stability
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# No logging
CONFIG_ZMK_USB_LOGGING=n

# Don't clear bonds on start
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Pointing
CONFIG_ZMK_POINTING=y
